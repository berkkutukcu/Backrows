{% extends "base.html" %}
{% block title %}Giriş Yap — BackRows{% endblock %}
{% block nav %}
    <a href="/register">Kayıt Ol</a>
    <a href="/qr-login">QR ile Giriş</a>
{% endblock %}
{% block content %}
<section class="card auth-card">
    <h1>Giriş Yap</h1>
    {% if mesaj %}<p class="muted">{{ mesaj }}</p>{% endif %}
    {% if hata %}<p class="error">{{ hata }}</p>{% endif %}
    <form method="post" action="/login">
        <label for="eposta">E-posta</label>
        <input type="email" id="eposta" name="eposta" required>
        <label for="sifre">Şifre</label>
        <input type="password" id="sifre" name="sifre" required>
        <div class="form-actions">
            <button type="submit">Giriş Yap</button>
            <a class="btn-secondary" href="/register">Kayıt Ol</a>
            <a class="btn-secondary" href="/qr-login">QR ile Giriş</a>
        </div>
    </form>
</section>
{% endblock %}

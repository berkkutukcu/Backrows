{% extends "base.html" %}
{% block title %}QR ile Giriş — BackRows{% endblock %}
{% block nav %}
    <a href="/">Giriş Yap</a>
    <a href="/register">Kayıt Ol</a>
{% endblock %}
{% block content %}
<section class="card auth-card">
    <h1>QR ile Giriş</h1>
    <p class="muted">Kameranızı QR kodunuza doğrultun.</p>
    <div id="qr-reader" style="width: 320px; max-width: 100%;"></div>
    <p id="qr-status" class="muted"></p>
    <details>
        <summary>Kamera yerine elle token girişi</summary>
        <form id="manual-form">
            <label for="manual-token">Token</label>
            <input type="text" id="manual-token" required>
            <button type="submit">Giriş Yap</button>
        </form>
    </details>
</section>
{% endblock %}
{% block scripts %}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="{{ url_for('static', path='js/qr-scanner.js') }}"></script>
{% endblock %}

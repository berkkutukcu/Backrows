{% extends "base.html" %}
{% block title %}Kayıt Ol — BackRows{% endblock %}
{% block nav %}
    <a href="/">Giriş Yap</a>
{% endblock %}
{% block content %}
<section class="card auth-card">
    <h1>Kayıt Ol</h1>
    {% if hata %}<p class="error">{{ hata }}</p>{% endif %}
    <form method="post" action="/register">
        <label for="ad">Ad</label>
        <input type="text" id="ad" name="ad" value="{{ ad or '' }}" required>
        <label for="soyad">Soyad</label>
        <input type="text" id="soyad" name="soyad" value="{{ soyad or '' }}" required>
        <label for="telefon">Telefon (10 hane, başında 0 yok)</label>
        <input type="tel" id="telefon" name="telefon" value="{{ telefon or '' }}" required>
        <label for="eposta">E-posta</label>
        <input type="email" id="eposta" name="eposta" value="{{ eposta or '' }}" required>
        <label for="sifre">Şifre (en az 8 karakter + bir özel karakter)</label>
        <input type="password" id="sifre" name="sifre" required>
        <label for="sifre_tekrar">Şifre (Tekrar)</label>
        <input type="password" id="sifre_tekrar" name="sifre_tekrar" required>
        <div class="form-actions">
            <button type="submit">Kayıt Ol</button>
            <a class="btn-secondary" href="/">Vazgeç</a>
        </div>
    </form>
</section>
{% endblock %}
